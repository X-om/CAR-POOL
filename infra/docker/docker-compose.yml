services:
  postgres:
    image: postgres:16-alpine
    container_name: carpool-postgres
    environment:
      POSTGRES_USER: carpool
      POSTGRES_PASSWORD: carpool
      POSTGRES_DB: carpool
    ports:
      - "5432:5432"
    volumes:
      - carpool_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  carpool_postgres_data:
