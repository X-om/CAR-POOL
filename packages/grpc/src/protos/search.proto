syntax = "proto3";
package search;

service SearchService {
    rpc SearchRides(SearchRidesRequest) returns (SearchRidesResponse);
    rpc GetRideSearchData(GetRideSearchDataRequest) returns (GetRideSearchDataResponse);
}

message SearchRidesRequest {
  double sourceLatitude = 1;
  double sourceLongitude = 2;

  double destinationLatitude = 3;
  double destinationLongitude = 4;

  int64 departureTime = 5; // Unix timestamp
  int32 requiredSeats = 6;
} 

message RideInfo {
  string rideId = 1;
  string driverId = 2;
  string vehicleId = 3;
  string sourceCity = 4;
  string destinationCity = 5;
  int64 departureTime = 6; // Unix timestamp
  // Driver-set price for the full ride (source->destination)
  double driverPricePerSeat = 7;

  // Computed by the system for the requested leg (pickup->dropoff)
  double estimatedPricePerSeat = 8;
  int32 availableSeats = 9;

  // The matched stops for pickup/dropoff along the ride route.
  int32 pickupStopOrder = 10;
  int32 dropoffStopOrder = 11;

  repeated RouteStop routeStops = 12;

  double driverRating = 13;
}

message RouteStop {
  int32 stopOrder = 1;
  string cityName = 2;
  double latitude = 3;
  double longitude = 4;
}

message SearchRidesResponse {
  repeated RideInfo rides = 1;
}

message GetRideSearchDataRequest {
  string rideId = 1;
}

message GetRideSearchDataResponse {
  string rideId = 1;
  string driverId = 2;
  string vehicleId = 3;
  string sourceCity = 4;
  string destinationCity = 5;
  int64 departureTime = 6; // Unix timestamp
  double driverPricePerSeat = 7;
  int32 availableSeats = 8;
  repeated RouteStop routeStops = 9;
  double driverRating = 10;
}

